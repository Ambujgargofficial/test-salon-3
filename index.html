                            <div className="overflow-x-auto max-h-[600px] scrollbar-hide">
                              <table className="w-full text-left border-collapse min-w-[900px] text-sm">
                                <thead className="sticky top-0 bg-gray-50 z-10 shadow-sm">
                                  <tr className="border-b border-gray-200 text-gray-600">
                                    <th className="px-4 py-3 font-semibold whitespace-nowrap">Month</th>
                                    <th className="px-4 py-3 font-semibold text-right">Cash</th>
                                    <th className="px-4 py-3 font-semibold text-right">Card</th>
                                    <th className="px-4 py-3 font-semibold text-right">Paytm</th>
                                    <th className="px-4 py-3 font-semibold text-right">UPI</th>
                                    <th className="px-4 py-3 font-semibold text-right text-green-700">Total Sales</th>
                                    <th className="px-4 py-3 font-semibold text-right text-red-600">Total Exp</th>
                                    <th className="px-4 py-3 font-semibold text-right text-orange-600">Total Purchase</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {monthlyReportData.map((month, index) => (
                                    <tr key={`month-${index}`} className="border-b border-gray-100 hover:bg-violet-50/30 transition-colors">
                                      <td className="px-4 py-2.5 text-gray-800 font-bold whitespace-nowrap">{month.displayMonth}</td>
                                      <td className="px-4 py-2.5 text-right text-gray-600">{formatCurrency(month.cash)}</td>
                                      <td className="px-4 py-2.5 text-right text-gray-600">{formatCurrency(month.card)}</td>
                                      <td className="px-4 py-2.5 text-right text-gray-600">{formatCurrency(month.paytm)}</td>
                                      <td className="px-4 py-2.5 text-right text-gray-600">{formatCurrency(month.upi)}</td>
                                      <td className="px-4 py-2.5 text-right font-bold text-green-700 bg-green-50/30">
                                        {formatCurrency(month.totalSales)}
                                      </td>
                                      <td className="px-4 py-2.5 text-right font-bold text-red-600 bg-red-50/30">
                                        {formatCurrency(month.totalExpense)}
                                      </td>
                                      <td className="px-4 py-2.5 text-right font-bold text-orange-600 bg-orange-50/30">
                                        {formatCurrency(month.totalPurchase)}
                                      </td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                          )}
                        </div>
                      </div>
                    )}

                    {/* View 7: Live Cash */}
                    {activeTab === 'live' && (
                      <div className="max-w-4xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-500 space-y-4">
                        <div className="bg-emerald-600 p-5 rounded-xl shadow-md border border-emerald-700 flex items-center gap-4 text-white relative overflow-hidden">
                          <div className="bg-white/10 p-3 rounded-lg backdrop-blur-sm z-10 shrink-0">
                            <span className="text-2xl">🟢</span>
                          </div>
                          <div className="z-10 overflow-hidden">
                            <p className="text-xs md:text-sm font-medium text-emerald-100">Overall Live Cash (All Selected Locations)</p>
                            <p className="text-2xl md:text-3xl font-bold truncate mt-0.5">
                              {formatCurrency(liveCashData.overallBalance)}
                            </p>
                          </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                          <div className="px-5 py-4 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center gap-4">
                            <div>
                                <h3 className="text-base font-bold text-gray-800">Location-wise Live Cash</h3>
                            </div>
                            <button
                              onClick={handleExportLiveCash}
                              className="flex items-center gap-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-3 py-1.5 rounded-lg font-medium text-xs transition-colors shadow-sm"
                            >
                              <Download className="w-3.5 h-3.5" /> Export
                            </button>
                          </div>

                          <div className="overflow-x-auto max-h-[600px] scrollbar-hide">
                            <table className="w-full text-left border-collapse text-sm">
                              <thead className="sticky top-0 bg-gray-50 z-10 shadow-sm">
                                <tr className="border-b border-gray-200 text-gray-600">
                                  <th className="px-5 py-2 font-semibold">Saloon Location</th>
                                  <th className="px-5 py-2 font-semibold text-right text-emerald-800">Live Cash Balance</th>
                                </tr>
                              </thead>
                              <tbody>
                                {liveCashData.breakdown.map((loc, index) => (
                                  <tr key={`live-${index}`} className="border-b border-gray-100 hover:bg-gray-50/50 transition-colors">
                                    <td className="px-5 py-2.5 text-gray-800 font-medium">{loc.location}</td>
                                    <td className="px-5 py-2.5 text-right font-bold text-emerald-700 bg-emerald-50/30">
                                      {formatCurrency(loc.liveBalance)}
                                    </td>
                                  </tr>
                                ))}
                                {/* Grand Total Row */}
                                <tr className="bg-gray-100 border-t-2 border-gray-300 font-bold text-gray-900 sticky bottom-0">
                                  <td className="px-5 py-3.5">ALL LOCATIONS (GRAND TOTAL)</td>
                                  <td className="px-5 py-3.5 text-right text-emerald-800 text-base">{formatCurrency(liveCashData.overallBalance)}</td>
                                </tr>
                              </tbody>
                            </table>
                          </div>
                        </div>
                      </div>
                    )}
                  </>
                )}
              </div>

              {/* Expense Drill-Down Modal */}
              {selectedExpenseForDetail && (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                  <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center px-6 py-5 border-b border-gray-100 bg-gray-50 gap-4">
                      <div>
                        <h3 className="text-xl font-bold text-gray-900">{selectedExpenseForDetail.head}</h3>
                        <p className="text-sm text-gray-500 mt-1">
                          Total: <span className="font-bold text-indigo-600">{formatCurrency(modalFilteredTotal)}</span> 
                          <span className="mx-2">•</span> 
                          {modalFilteredDetails.length} Transaction(s)
                        </p>
                      </div>
                      <div className="flex items-center gap-3 w-full sm:w-auto">
                        <select
                          value={modalLocationFilter}
                          onChange={(e) => setModalLocationFilter(e.target.value)}
                          className="border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 outline-none transition-all bg-white text-gray-800 text-sm flex-1 sm:flex-none cursor-pointer shadow-sm"
                        >
                          <option value="All">All Locations</option>
                          {modalLocations.map((loc, idx) => (
                            <option key={`mod-loc-${idx}`} value={loc}>{loc}</option>
                          ))}
                        </select>
                        <button 
                          onClick={handleExportModalDetails}
                          className="flex items-center justify-center gap-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded-lg font-medium transition-colors shadow-sm text-sm"
                          title="Export CSV"
                        >
                          <Download className="w-4 h-4" /> Export
                        </button>
                        <button 
                          onClick={() => { setSelectedExpenseForDetail(null); setModalLocationFilter('All'); }}
                          className="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors shrink-0 ml-1"
                        >
                          <X className="w-6 h-6" />
                        </button>
                      </div>
                    </div>

                    <div className="overflow-y-auto p-0 scrollbar-hide flex-1">
                      <table className="w-full text-left border-collapse text-sm">
                        <thead className="sticky top-0 bg-white shadow-sm ring-1 ring-black/5 z-10">
                          <tr className="text-gray-500 bg-gray-100/90 backdrop-blur-md uppercase tracking-wider text-xs">
                            <th className="px-6 py-3.5 font-bold whitespace-nowrap border-b border-gray-200">Date</th>
                            <th className="px-6 py-3.5 font-bold border-b border-gray-200">Remarks / SubHead</th>
                            <th className="px-6 py-3.5 font-bold border-b border-gray-200">Location</th>
                            <th className="px-6 py-3.5 font-bold text-right whitespace-nowrap border-b border-gray-200">Exp Amt</th>
                            {selectedExpenseForDetail.head?.trim() === 'Incentive Expenses' && (
                                <th className="px-6 py-3.5 font-bold border-b border-gray-200">Sold By</th>
                            )}
                          </tr>
                        </thead>
                        <tbody>
                          {modalFilteredDetails.map((item, idx) => (
                            <tr key={`mod-${idx}`} className="border-b border-gray-100 hover:bg-indigo-50/30 transition-colors">
                              <td className="px-6 py-3.5 text-gray-600 whitespace-nowrap">{item.displayDate || 'Unknown Date'}</td>
                              <td className="px-6 py-3.5 text-gray-800 font-medium">{item.remarks || <span className="text-gray-400 italic">No remarks</span>}</td>
                              <td className="px-6 py-3.5 text-gray-600 whitespace-nowrap">{item.location || 'Unknown'}</td>
                              <td className="px-6 py-3.5 text-right text-gray-900 font-bold whitespace-nowrap">
                                {formatCurrency(item.expenseAmount)}
                              </td>
                              {selectedExpenseForDetail.head?.trim() === 'Incentive Expenses' && (
                                <td className="px-6 py-3.5 text-gray-600 whitespace-nowrap">{item.soldBy || '-'}</td>
                              )}
                            </tr>
                          ))}
                          {modalFilteredDetails.length === 0 && (
                            <tr>
                              <td colSpan="5" className="p-10 text-center text-gray-500 text-base">No transactions found for this location.</td>
                            </tr>
                          )}
                        </tbody>
                      </table>
                    </div>
                    
                    <div className="p-4 border-t border-gray-100 bg-gray-50 text-right">
                      <button 
                        onClick={() => { setSelectedExpenseForDetail(null); setModalLocationFilter('All'); }}
                        className="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium rounded-lg transition-colors text-sm"
                      >
                        Close View
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* Cash Variance Drill-Down Modal */}
              {selectedCashVarDetail && (
                <div className="fixed inset-0 bg-black/60 z-[60] flex items-center justify-center p-3 backdrop-blur-sm">
                  <div className="bg-white rounded-xl shadow-2xl w-full max-w-lg flex flex-col overflow-hidden animate-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center px-6 py-4 border-b border-gray-100 bg-gray-50">
                      <div>
                        <h3 className="text-lg font-bold text-gray-900">Manager Cash Details</h3>
                        <p className="text-sm text-gray-500 mt-1">
                          {selectedCashVarDetail.location} • {selectedCashVarDetail.displayDate}
                        </p>
                      </div>
                      <button
                        onClick={() => setSelectedCashVarDetail(null)}
                        className="p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors"
                      >
                        <X className="w-6 h-6" />
                      </button>
                    </div>

                    <div className="p-6 space-y-5">
                      {/* Highlighted Total Cash */}
                      <div className="bg-gradient-to-r from-emerald-500 to-teal-600 rounded-xl p-5 text-white shadow-md text-center relative overflow-hidden">
                          <div className="relative z-10">
                              <p className="text-emerald-100 text-sm font-medium mb-1">Total Cash in Locker (Submitted)</p>
                              <p className="text-4xl font-bold tracking-tight">{formatCurrency(selectedCashVarDetail.mgrClosingCash)}</p>
                          </div>
                          <IndianRupee className="absolute -right-2 -bottom-2 w-20 h-20 text-white opacity-20 pointer-events-none" />
                      </div>

                      {/* System vs Manager Summary */}
                      <div className="grid grid-cols-2 gap-4">
                          <div className="bg-gray-50 rounded-xl p-3 border border-gray-100 text-center">
                              <p className="text-xs text-gray-500 font-bold uppercase tracking-wider mb-1">System Comp.</p>
                              <p className="text-xl font-bold text-gray-800">{formatCurrency(selectedCashVarDetail.sysClosingCash)}</p>
                          </div>
                          <div className={`rounded-xl p-3 border text-center ${selectedCashVarDetail.cashVar < 0 ? 'bg-red-50 border-red-100' : selectedCashVarDetail.cashVar > 0 ? 'bg-green-50 border-green-100' : 'bg-gray-50 border-gray-100'}`}>
                              <p className={`text-xs font-bold uppercase tracking-wider mb-1 ${selectedCashVarDetail.cashVar < 0 ? 'text-red-500' : selectedCashVarDetail.cashVar > 0 ? 'text-green-600' : 'text-gray-500'}`}>Variance</p>
                              <p className={`text-xl font-bold ${selectedCashVarDetail.cashVar < 0 ? 'text-red-700' : selectedCashVarDetail.cashVar > 0 ? 'text-green-700' : 'text-gray-800'}`}>
                                  {selectedCashVarDetail.cashVar > 0 ? '+' : ''}{formatCurrency(selectedCashVarDetail.cashVar)}
                              </p>
                          </div>
                      </div>

                      {/* Denomination Breakdown */}
                      <div>
                          <h4 className="text-sm font-bold text-gray-600 mb-3 uppercase tracking-wider text-center">Denomination Breakdown</h4>
                          <div className="border border-gray-200 rounded-xl overflow-hidden shadow-sm">
                              <table className="w-full text-left text-sm">
                                  <thead className="bg-gray-50 border-b border-gray-200 text-gray-500">
                                      <tr>
                                          <th className="py-2.5 px-4 font-semibold">Notes/Coins</th>
                                          <th className="py-2.5 px-4 font-semibold text-center">Count</th>
                                          <th className="py-2.5 px-4 font-semibold text-right">Amount</th>
                                      </tr>
                                  </thead>
                                  <tbody className="divide-y divide-gray-100">
                                      <tr className="hover:bg-gray-50">
                                          <td className="py-2 px-4 font-medium text-gray-700 flex items-center gap-2"><span className="w-5 h-3.5 bg-purple-100 border border-purple-300 rounded-sm inline-block"></span> ₹500</td>
                                          <td className="py-2 px-4 text-center font-bold text-gray-800">{selectedCashVarDetail.mgrNotes?.n500 || 0}</td>
                                          <td className="py-2 px-4 text-right font-medium">{formatCurrency((selectedCashVarDetail.mgrNotes?.n500 || 0) * 500)}</td>
                                      </tr>
                                      <tr className="hover:bg-gray-50">
                                          <td className="py-2 px-4 font-medium text-gray-700 flex items-center gap-2"><span className="w-5 h-3.5 bg-orange-100 border border-orange-300 rounded-sm inline-block"></span> ₹200</td>
                                          <td className="py-2 px-4 text-center font-bold text-gray-800">{selectedCashVarDetail.mgrNotes?.n200 || 0}</td>
                                          <td className="py-2 px-4 text-right font-medium">{formatCurrency((selectedCashVarDetail.mgrNotes?.n200 || 0) * 200)}</td>
                                      </tr>
                                      <tr className="hover:bg-gray-50">
                                          <td className="py-2 px-4 font-medium text-gray-700 flex items-center gap-2"><span className="w-5 h-3.5 bg-blue-100 border border-blue-300 rounded-sm inline-block"></span> ₹100</td>
                                          <td className="py-2 px-4 text-center font-bold text-gray-800">{selectedCashVarDetail.mgrNotes?.n100 || 0}</td>
                                          <td className="py-2 px-4 text-right font-medium">{formatCurrency((selectedCashVarDetail.mgrNotes?.n100 || 0) * 100)}</td>
                                      </tr>
                                      <tr className="hover:bg-gray-50">
                                          <td className="py-2 px-4 font-medium text-gray-700 flex items-center gap-2"><span className="w-5 h-3.5 bg-cyan-100 border border-cyan-300 rounded-sm inline-block"></span> ₹50</td>
                                          <td className="py-2 px-4 text-center font-bold text-gray-800">{selectedCashVarDetail.mgrNotes?.n50 || 0}</td>
                                          <td className="py-2 px-4 text-right font-medium">{formatCurrency((selectedCashVarDetail.mgrNotes?.n50 || 0) * 50)}</td>
                                      </tr>
                                      <tr className="hover:bg-gray-50">
                                          <td className="py-2 px-4 font-medium text-gray-700 flex items-center gap-2"><span className="w-5 h-3.5 bg-red-100 border border-red-300 rounded-sm inline-block"></span> ₹20</td>
                                          <td className="py-2 px-4 text-center font-bold text-gray-800">{selectedCashVarDetail.mgrNotes?.n20 || 0}</td>
                                          <td className="py-2 px-4 text-right font-medium">{formatCurrency((selectedCashVarDetail.mgrNotes?.n20 || 0) * 20)}</td>
                                      </tr>
                                      <tr className="hover:bg-gray-50">
                                          <td className="py-2 px-4 font-medium text-gray-700 flex items-center gap-2"><span className="w-5 h-3.5 bg-amber-100 border border-amber-300 rounded-sm inline-block"></span> ₹10</td>
                                          <td className="py-2 px-4 text-center font-bold text-gray-800">{selectedCashVarDetail.mgrNotes?.n10 || 0}</td>
                                          <td className="py-2 px-4 text-right font-medium">{formatCurrency((selectedCashVarDetail.mgrNotes?.n10 || 0) * 10)}</td>
                                      </tr>
                                      <tr className="bg-gray-50 border-t border-gray-200">
                                          <td className="py-2.5 px-4 font-bold text-gray-700 flex items-center gap-2">🪙 Loose / Coins</td>
                                          <td className="py-2.5 px-4 text-center text-gray-400">-</td>
                                          <td className="py-2.5 px-4 text-right font-bold text-gray-900">{formatCurrency(selectedCashVarDetail.mgrNotes?.loose || 0)}</td>
                                      </tr>
                                  </tbody>
                              </table>
                          </div>
                          <p className="text-[10px] text-gray-400 mt-1.5 text-center">Submitted by <span className="font-semibold text-gray-500">{selectedCashVarDetail.mgrManagerName}</span></p>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        }

        function AppWithBoundary() {
          return (
            <ErrorBoundary>
              <DashboardApp />
            </ErrorBoundary>
          );
        }

        // --- Render the Application ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppWithBoundary />);
    </script>
</body>
</html>
